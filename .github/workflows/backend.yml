name: backend

on:
  push:
    branches: [master, main]
    paths: ["backend/**", "agent-runtime/**", ".github/workflows/backend.yml"]
  pull_request:
    paths: ["backend/**", "agent-runtime/**", ".github/workflows/backend.yml"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agentworks
          POSTGRES_PASSWORD: agentworks_dev
          POSTGRES_DB: agentworks_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U agentworks"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql+asyncpg://agentworks:agentworks_dev@localhost:5432/agentworks_test
      REDIS_URL: redis://localhost:6379/0
      ANTHROPIC_API_KEY: dummy-for-tests
      AUTH_DISABLED_FOR_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e "./agent-runtime"
          pip install -e "./backend[dev]"
      - name: Lint
        run: |
          ruff check backend agent-runtime
          ruff format --check backend agent-runtime
      - name: Test
        run: pytest backend agent-runtime -q
