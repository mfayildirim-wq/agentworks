services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agentworks-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentworks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentworks_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agentworks}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agentworks_db:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentworks}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agentworks-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - agentworks_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  agentworks_db:
  agentworks_redis:
